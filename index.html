<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Chart — 西洋占星術鑑定</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;900&family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap');
:root{
  --bg:#f5f0e8;--panel:#faf6ec;--border:#c8a060;--gold:#a07030;--text:#2a1a00;
  --dim:#8a7050;--blue:#1a3a8a;--red:#8a1a1a;--green:#1a5a1a;--mid:#5a4020;
  --dark:#1a1035;--dtext:#e8e4f8;--ddim:#8880a8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--dtext);font-family:'Noto Serif JP',serif;font-weight:300;min-height:100vh;}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;background:linear-gradient(160deg,#1a1035 0%,#0d1f3c 50%,#1a1035 100%);}
.h1{font-family:'Cinzel Decorative',serif;font-size:clamp(22px,5vw,44px);font-weight:900;background:linear-gradient(135deg,#c8a96e,#e8c88e,#9ba8cc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:14px 0 10px;}
.hsub{font-size:11px;letter-spacing:.3em;color:var(--ddim);margin-bottom:34px;}
.sym{font-size:36px;filter:drop-shadow(0 0 10px #c8a96e);}
.hline{width:1px;height:40px;background:linear-gradient(to bottom,transparent,#252560,transparent);margin:0 auto 34px;}

/* FORM */
.fc{background:rgba(255,255,255,0.06);border:1px solid rgba(200,169,110,0.4);border-radius:16px;padding:26px 22px;width:100%;max-width:450px;box-shadow:0 0 50px rgba(0,0,0,.6);position:relative;}
.fc::before{content:'';position:absolute;top:-1px;left:25%;right:25%;height:1px;background:linear-gradient(90deg,transparent,#c8a96e,transparent);}
.ftit{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;color:#c8a96e;text-align:center;margin-bottom:18px;text-transform:uppercase;}
.fr{margin-bottom:13px;position:relative;}
.fr label{display:block;font-size:10px;color:#5a5878;letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase;}
.fr input,.fr select{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(200,169,110,0.3);border-radius:7px;color:var(--dtext);font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px 10px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.fr input:focus,.fr select:focus{border-color:#6478c8;}
.fr select option{background:#1a1035;}
.fcols{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ntbtn{display:block;width:100%;text-align:center;font-size:10px;color:#5a5878;margin-top:4px;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Noto Serif JP',serif;}
.un{background:#06061a;border:1px solid #1c1c45;border-radius:6px;padding:8px 10px;margin-top:5px;font-size:11px;color:#c8c0e0;line-height:1.7;display:none;}
.un.show{display:block;}
.sbtn{width:100%;margin-top:16px;background:linear-gradient(135deg,#2a2060,#3a2880);border:1px solid #c8a96e;border-radius:8px;padding:12px;color:#c8a96e;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.2em;cursor:pointer;transition:all .3s;}
.sbtn:hover{box-shadow:0 0 18px rgba(200,169,110,.2);}
.sbtn:disabled{opacity:.4;cursor:not-allowed;}
#csg{display:none;position:absolute;left:0;right:0;top:calc(100% - 1px);background:#0e0e28;border:1px solid #252560;border-radius:0 0 8px 8px;z-index:100;box-shadow:0 6px 18px rgba(0,0,0,.6);overflow:hidden;}
.si{padding:8px 10px;cursor:pointer;border-bottom:1px solid #1c1c45;display:flex;justify-content:space-between;align-items:center;font-size:12px;transition:background .15s;}
.si:last-child{border-bottom:none;}
.si:hover,.si.ac{background:#12122f;}
.sin{color:var(--dtext);}
.sic{font-size:10px;color:#5a5878;font-family:'JetBrains Mono',monospace;}
#gs{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#5a5878;pointer-events:none;}

/* RESULT */
#rp{display:none;background:linear-gradient(160deg,#1a1035 0%,#0d1f3c 100%);padding:24px 14px 60px;max-width:860px;margin:0 auto;}
#rp.show{display:block;}
.rh{text-align:center;padding:24px 0 18px;border-bottom:1px solid #1c1c45;margin-bottom:22px;}
.rt{font-family:'Cinzel Decorative',serif;font-size:clamp(13px,3vw,20px);background:linear-gradient(135deg,#c8a96e,#e8c88e,#9ba8cc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.rs{font-size:10px;color:#5a5878;letter-spacing:.1em;}
.bkbtn{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid #1c1c45;border-radius:6px;padding:5px 12px;color:#5a5878;font-size:11px;cursor:pointer;font-family:'Noto Serif JP',serif;margin-bottom:18px;}
.bkbtn:hover{border-color:#c8a96e;color:#c8a96e;}

/* CHART LAYOUT */
.cs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;align-items:start;}
@media(max-width:560px){.cs{grid-template-columns:1fr;}}
.cw{background:var(--panel);border:2px solid var(--border);border-radius:10px;padding:5px;display:flex;align-items:center;justify-content:center;}
#nc{display:block;max-width:100%;height:auto;}

/* PLANET TABLE */
.ptw{background:rgba(255,255,255,0.05);border:1px solid rgba(200,169,110,0.25);border-radius:10px;padding:13px;}
.ptt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:#c8a96e;margin-bottom:9px;text-transform:uppercase;}
.pr{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(28,28,69,.5);font-size:11px;gap:6px;}
.pr:last-child{border-bottom:none;}
.ps{width:17px;text-align:center;font-size:13px;}
.pn{color:#5a5878;width:44px;font-size:10px;}
.pg{flex:1;color:var(--dtext);}
.pd{font-family:'JetBrains Mono',monospace;font-size:10px;color:#c8c0e0;}
.prt{font-size:8px;color:#c86888;}
.ph{font-size:9px;font-family:'JetBrains Mono',monospace;color:#6478c8;background:rgba(100,120,200,.1);border:1px solid rgba(100,120,200,.2);border-radius:3px;padding:1px 4px;}

/* ASPECTS */
.as2{background:rgba(255,255,255,0.05);border:1px solid rgba(200,169,110,0.25);border-radius:10px;padding:14px;margin-bottom:16px;}
.ast{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:#c8a96e;text-transform:uppercase;margin-bottom:10px;}
.asg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;}
.ac2{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.04);border:1px solid rgba(100,120,200,0.3);border-radius:5px;padding:5px 8px;font-size:10px;}
.at{font-weight:600;font-size:11px;}
.aconj{color:#c8a96e;}.atrin{color:#78b890;}.asext{color:#6478c8;}.asq{color:#c86888;}.aopp{color:#c05050;}
.ab{color:#5a5878;}
.ao{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:#5a5878;}

/* READING */
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:560px){.rg{grid-template-columns:1fr;}}
.rc{background:rgba(255,255,255,0.05);border:1px solid rgba(200,169,110,0.25);border-radius:11px;padding:16px;position:relative;overflow:hidden;}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.rcp::before{background:linear-gradient(90deg,#c8a96e,#e8c88e);}
.rcd::before{background:linear-gradient(90deg,#6478c8,#8898e8);}
.rcm::before{background:linear-gradient(90deg,#c86888,#e898b8);}
.ri{font-size:20px;margin-bottom:6px;}
.rl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:9px;}
.rcp .rl{color:#c8a96e;}.rcd .rl{color:#6478c8;}.rcm .rl{color:#c86888;}
.rtx{font-size:11px;line-height:1.95;color:#c8c0e0;}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px;gap:8px;}
.sp{width:20px;height:20px;border:2px solid #1c1c45;border-top-color:#c8a96e;border-radius:50%;animation:spin 1s linear infinite;}
.ts{background:rgba(255,255,255,0.05);border:1px solid rgba(200,169,110,0.25);border-radius:11px;padding:16px;margin-bottom:24px;}
.tst{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:#9ba8cc;text-transform:uppercase;margin-bottom:10px;}
.tsr{font-size:11px;line-height:1.95;color:#c8c0e0;}
.ub{background:rgba(200,169,110,0.1);border:1px solid #c8a96e;border-radius:8px;padding:9px 13px;margin-bottom:14px;display:none;align-items:center;gap:8px;font-size:11px;}
.ub.show{display:flex;}
.ubt{color:#c8c0e0;}
.ubl{margin-left:auto;font-size:10px;color:#c8a96e;cursor:pointer;text-decoration:underline;white-space:nowrap;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

</head>
<body>
<div class="hero" id="HP">
  <div class="sym">✦</div>
  <div class="h1">CELESTIAL CHART</div>
  <div class="hsub">西洋占星術 AI 鑑定</div>
  <div class="hline"></div>
  <div class="fc">
    <div class="ftit">☿ 生年月日・出生地を入力</div>
    <div class="fr"><label>生年月日</label><input type="date" id="idate" value="1990-04-15"></div>
    <div class="fr">
      <label>出生時間</label>
      <input type="time" id="itime" value="14:30">
      <button class="ntbtn" id="ntbtn" onclick="toggleNT()">出生時間がわからない</button>
      <div class="un" id="un">✅ 太陽・月・全惑星 ✅ アスペクト<br><span style="opacity:.6">※ ASC・MC・ハウスは時間が必要</span></div>
    </div>
    <div class="fr">
      <label>タイムゾーン（UTC基準）</label>
      <select id="itz">
        <option value="9" selected>JST +9（日本・韓国）</option>
        <option value="8">CST +8（中国・台湾・香港）</option>
        <option value="7">ICT +7（タイ・ベトナム）</option>
        <option value="5.5">IST +5:30（インド）</option>
        <option value="4">GST +4（ドバイ）</option>
        <option value="3">MSK +3（モスクワ）</option>
        <option value="2">CEST +2（中欧夏時間）</option>
        <option value="1">CET +1（中欧）</option>
        <option value="0">UTC +0（ロンドン）</option>
        <option value="-5">EST -5（ニューヨーク）</option>
        <option value="-8">PST -8（ロサンゼルス）</option>
        <option value="-9">AKST -9（アラスカ）</option>
      </select>
    </div>
    <div class="fr" style="position:relative">
      <label>出生地（都市名）</label>
      <div style="position:relative">
        <input type="text" id="icity" value="" placeholder="例: 東京 / 福岡 / New York" autocomplete="off"
          oninput="ci(this.value)" onkeydown="ck(event)" onblur="cb()">
        <div id="gs"></div>
      </div>
      <div id="csg"></div>
    </div>
    <div class="fcols">
      <div class="fr"><label>緯度（自動入力）</label><input type="number" id="ilat" value="" placeholder="例: 33.5904" step="0.0001"></div>
      <div class="fr"><label>経度（自動入力）</label><input type="number" id="ilng" value="" placeholder="例: 130.4017" step="0.0001"></div>
    </div>
    <button class="sbtn" id="sbtn" onclick="startReading()">✦ 星を読む ✦</button>
  </div>
</div>

<section id="rp">
  <div class="rh">
    <button class="bkbtn" onclick="goBack()">← 戻る</button>
    <div class="rt" id="rt">NATAL CHART</div>
    <div class="rs" id="rs"></div>
  </div>
  <div class="ub" id="ub"><span>⏰</span><span class="ubt">出生時間不明。正午設定で計算。</span><span class="ubl" onclick="goBack()">時間を入力 →</span></div>
  <div class="cs">
    <div class="cw"><canvas id="nc" width="360" height="360"></canvas></div>
    <div class="ptw"><div class="ptt">☿ 天体配置</div><div id="pl"></div></div>
  </div>
  <div class="as2"><div class="ast">✧ 主要アスペクト</div><div class="asg" id="ag"></div></div>
  <div class="rg">
    <div class="rc rcp"><div class="ri">☀️</div><div class="rl">性格</div><div class="rtx" id="rcp"><div class="ld"><div class="sp"></div><span style="font-size:10px;color:#5a5878">鑑定中…</span></div></div></div>
    <div class="rc rcd"><div class="ri">♄</div><div class="rl">運命</div><div class="rtx" id="rcd"><div class="ld"><div class="sp" style="border-top-color:#6478c8"></div><span style="font-size:10px;color:#5a5878">鑑定中…</span></div></div></div>
    <div class="rc rcm"><div class="ri">☽</div><div class="rl">使命</div><div class="rtx" id="rcm"><div class="ld"><div class="sp" style="border-top-color:#c86888"></div><span style="font-size:10px;color:#5a5878">鑑定中…</span></div></div></div>
  </div>
  <div class="as2" style="margin-bottom:16px">
  <div class="ast">◈ エレメント＆クオリティ分布</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <div style="text-align:center">
      <div style="font-size:9px;color:#c8a060;letter-spacing:.1em;margin-bottom:6px">エレメント</div>
      <canvas id="dist-chart" width="160" height="160"></canvas>
    </div>
    <div style="text-align:center">
      <div style="font-size:9px;color:#c8a060;letter-spacing:.1em;margin-bottom:6px">クオリティ</div>
      <canvas id="qual-chart" width="160" height="160"></canvas>
    </div>
  </div>
  <div id="dist-comment" style="font-size:11px;line-height:1.8;color:#c8c0e0;margin-top:8px"></div>
</div>
<div class="ts"><div class="tst">◎ 現在のトランジット運勢</div><div class="tsr" id="tr"><div class="ld"><div class="sp" style="border-top-color:#9ba8cc"></div></div></div></div>
</section>

<script>
// ============================================================
// 西洋占星術 鑑定エンジン v1.0
// コストゼロ・辞書引き方式
// ============================================================

// ── 1. 推奨入力データ構造 ──────────────────────────────────
/*
calcChart()が返すJSONの推奨形式:

{
  meta: {
    birthDate: "1977-07-11",
    birthTime: "16:10",
    birthTimeKnown: true,
    city: "福岡",
    lat: 33.5904,
    lng: 130.4017,
    tzOffset: 9
  },
  planets: [
    {
      name: "Sun",           // 天体名（英語）
      nameJa: "太陽",
      lon: 108.9,            // 黄経（0-360）
      sign: "Cancer",        // サイン（英語）
      signJa: "蟹座",
      signIndex: 3,          // 0=牡羊〜11=魚
      deg: 18.9,             // サイン内の度数
      house: 8,              // ハウス番号（1-12）、時間不明時はnull
      element: "water",      // fire/earth/air/water
      quality: "cardinal",   // cardinal/fixed/mutable
      retrograde: false
    },
    // ... Moon, Mercury, Venus, Mars, Jupiter, Saturn, Uranus, Neptune, Pluto
  ],
  angles: {
    asc: { lon: 244.2, sign: "Sagittarius", signJa: "射手座", deg: 4.2 },
    mc:  { lon: 165.9, sign: "Virgo",       signJa: "乙女座",  deg: 15.9 },
    dsc: { lon: 64.2,  sign: "Gemini",      signJa: "双子座",  deg: 4.2 },
    ic:  { lon: 345.9, sign: "Pisces",      signJa: "魚座",    deg: 15.9 }
  },
  houseCusps: [244.2, 278.1, 312.0, 345.9, 12.0, 38.1, 64.2, 98.1, 132.0, 165.9, 192.0, 218.1],
  aspects: [
    { p1: "Sun", p2: "Pluto", type: "square", orb: 2.3 },
    ...
  ],
  birthTimeKnown: true
}
*/

// ── 2. 辞書キー設計 ──────────────────────────────────────────
// キー命名規則: {カテゴリ}_{天体}_{サイン/ハウス/エレメント}
// 例: NATAL_SUN_CANCER, NATAL_MOON_TAURUS, TRANSIT_RETROGRADE_MERCURY_H3

const SIGN_KEYS = {
  "Aries":"ARIES","Taurus":"TAURUS","Gemini":"GEMINI","Cancer":"CANCER",
  "Leo":"LEO","Virgo":"VIRGO","Libra":"LIBRA","Scorpio":"SCORPIO",
  "Sagittarius":"SAGITTARIUS","Capricorn":"CAPRICORN","Aquarius":"AQUARIUS","Pisces":"PISCES"
};
const PLANET_KEYS = {
  "Sun":"SUN","Moon":"MOON","Mercury":"MERCURY","Venus":"VENUS","Mars":"MARS",
  "Jupiter":"JUPITER","Saturn":"SATURN","Uranus":"URANUS","Neptune":"NEPTUNE","Pluto":"PLUTO"
};
const ELEMENT_KEYS = { fire:"FIRE", earth:"EARTH", air:"AIR", water:"WATER" };
const QUALITY_KEYS = { cardinal:"CARDINAL", fixed:"FIXED", mutable:"MUTABLE" };

// ── 3. 鑑定辞書 ──────────────────────────────────────────────
// 資料の内容をそのまま組み込み

const DICT = {

  // ===== エレメント単体 =====
  ELEMENT_FIRE: {
    title: "火のエネルギー",
    summary: "物事を変える力を最大の特徴とする。人生を切り開く行動力とエネルギーにあふれている。気まぐれでじっとしていることが出来ず、活動的で力強く、大抵はとても目立つ。",
    keyword: ["情熱的","行動的","自己中心的","エネルギッシュ","刺激を求める"],
    caution: "情熱的な自我と度を越した大胆さで、相手を焼き尽くす危険性がある。"
  },
  ELEMENT_EARTH: {
    title: "地のエネルギー",
    summary: "あらゆる物質の形がはっきりしていて、現実の世界でどんな働きをするのか、どんな味がするのか、それが重要。現実を把握し、目の前のことに没頭する傾向がある。",
    keyword: ["実務的","信頼感","保守的","生産的","合理的"],
    caution: "リスクではなく安全、混乱ではなく秩序を求める。コントロールを失うことを心の底から恐れている。"
  },
  ELEMENT_AIR: {
    title: "風のエネルギー",
    summary: "自然の風と同じで、どこにでも溶け込み、絶え間なく動き、世の中でふれたものすべてを結びつけ、関連性をもたせる。感情に左右されず観念的で、私情を挟まない。",
    keyword: ["知的","さわやか","おしゃべり","好奇心旺盛","実体が掴めない"],
    caution: "感情の世界に置かれると、筋の通った論理的思考が役に立たないため、不安に襲われ、無防備になる傾向がある。"
  },
  ELEMENT_WATER: {
    title: "水のエネルギー",
    summary: "爽やかな空気をもたらし、命を育み、浄化する。力強く人を魅了し、謎めいている。人と親密になり同化し、情緒面を安定させたい。",
    keyword: ["思いやり","献身的","癒し","順応力","感受性豊か"],
    caution: "感情、ロマンスや想像力といった不合理な世界に心を動かす。感情に支配されるゆえ、感情・価値観・調和・絆・記憶に関心を持つ。"
  },

  // ===== エレメントコンビネーション（太陽×月） =====
  COMBO_FIRE_FIRE: {
    title: "炎のイメージ──燃える、吠える、何にも猶予を与えない",
    summary: "燃えるような情熱を胸に、自分本位な考えに基づいた生き方を貫く。あつかましくて傲慢で気が短いものの、子供のように人生を心ゆくまで楽しむ。人に自信を与えて「やってみよう」という気にさせることがとても上手。",
    caution: "持ち前のリーダー的資質を裏付けているのは「不可能なことなどない」という確信。"
  },
  COMBO_FIRE_AIR: {
    title: "発想力に恵まれる議論好きな社交家",
    summary: "おもしろいアイデアに溢れ、プレゼンテーション能力に長け、すさまじい熱意でまわりの人間を一人残らず関心させ説き伏せる。",
    caution: "現実性に欠けるため、社交性を発揮したり、斬新なアイデアをひねりだしたりするうちに精も根も尽き果ててしまうことがある。"
  },
  COMBO_FIRE_WATER: {
    title: "情熱的・芸術的で想像することにおいては大胆",
    summary: "激しやすくロマンティックで移り気。感情の起伏が大きい芸術家のような気質。自分の目標や芸術に向かって突き進む、熱烈な活動家。",

// ── 4. エレメント・クオリティ分布分析 ──────────────────────
function analyzeDistribution(chart) {
  const PERSONAL_PLANETS = ["Sun","Moon","Mercury","Venus","Mars"];
  const planets = chart.planets.filter(p => PERSONAL_PLANETS.includes(p.name));

  const elementCount = { fire:0, earth:0, air:0, water:0 };
  const qualityCount = { cardinal:0, fixed:0, mutable:0 };

  planets.forEach(p => {
    if (p.element) elementCount[p.element]++;
    if (p.quality) qualityCount[p.quality]++;
  });

  // Chart.js用レーダーチャートデータ
  const radarData = {
    labels: ["火（行動・情熱）","地（現実・安定）","風（知性・社交）","水（感情・直感）"],
    datasets: [{
      label: "エレメント分布",
      data: [elementCount.fire, elementCount.earth, elementCount.air, elementCount.water],
      backgroundColor: "rgba(200,120,80,0.2)",
      borderColor: "rgba(200,120,80,0.8)",
      borderWidth: 2,
      pointBackgroundColor: ["#e05030","#50a030","#c0a020","#2060c0"]
    }]
  };

  // 支配的エレメントとコンビネーション
  const sorted = Object.entries(elementCount).sort((a,b)=>b[1]-a[1]);
  const dominant = sorted[0][0];
  const secondary = sorted[1][0];

  const comboKey = `COMBO_${dominant.toUpperCase()}_${secondary.toUpperCase()}`;
  const comboText = DICT[comboKey] || null;

  return {
    elementCount,
    qualityCount,
    dominant,
    secondary,
    comboText,
    radarData,
    qualityRadar: {
      labels: ["活動宮（開拓・先導）","不動宮（持続・集中）","柔軟宮（適応・変化）"],
      datasets: [{
        label: "クオリティ分布",
        data: [qualityCount.cardinal, qualityCount.fixed, qualityCount.mutable],
        backgroundColor: "rgba(100,120,200,0.2)",
        borderColor: "rgba(100,120,200,0.8)",
        borderWidth: 2
      }]
    }
  };
}

// ── 5. 辞書引き鑑定メイン関数 ────────────────────────────────
function generateReading(chart) {
  const get = name => chart.planets.find(p => p.name === name);
  const sun = get("Sun"), moon = get("Moon"), merc = get("Mercury");
  const ven = get("Venus"), mars = get("Mars");
  const asc = chart.angles?.asc;
  const mc  = chart.angles?.mc;

  // 太陽鑑定
  const sunKey  = `NATAL_SUN_${SIGN_KEYS[sun?.sign] || ""}`;
  const moonKey = `NATAL_MOON_${SIGN_KEYS[moon?.sign] || ""}`;
  const sunData  = DICT[sunKey];
  const moonData = DICT[moonKey];

// ── 9. 出生時間不明時の月サイン警告 ────────────────────────────
function buildMoonWarning(moon, birthTimeKnown) {
  if (birthTimeKnown) return null;

  // 月は約13°/日で動く。サインの境界付近（0-3°または27-30°）は警告を出す
  const BOUNDARY_DEG = 3;
  if (!moon) return null;

  if (moon.deg < BOUNDARY_DEG) {
    const prevSignIndex = (moon.signIndex - 1 + 12) % 12;
    const SIGNS_JA = ["牡羊座","牡牛座","双子座","蟹座","獅子座","乙女座","天秤座","蠍座","射手座","山羊座","水瓶座","魚座"];
    return {
      type: "boundary_warning",
      message: `🌙 月は${moon.signJa||moon.sign}${moon.deg.toFixed(1)}°にあります（正午設定）。出生時刻によっては前のサイン「${SIGNS_JA[prevSignIndex]}」の可能性があります。正確なサインを知るには出生時間が必要です。`
    };
  }
  if (moon.deg > (30 - BOUNDARY_DEG)) {
    const nextSignIndex = (moon.signIndex + 1) % 12;
    const SIGNS_JA = ["牡羊座","牡牛座","双子座","蟹座","獅子座","乙女座","天秤座","蠍座","射手座","山羊座","水瓶座","魚座"];
    return {
      type: "boundary_warning",
      message: `🌙 月は${moon.signJa||moon.sign}${moon.deg.toFixed(1)}°にあります（正午設定）。出生時刻によっては次のサイン「${SIGNS_JA[nextSignIndex]}」の可能性があります。正確なサインを知るには出生時間が必要です。`
    };
  }

  return {
    type: "time_unknown",
    message: "⏰ 出生時間不明のため、ASC・MC・ハウス配置は表示していません。出生時間がわかると、より詳細な鑑定が可能になります。"
  };
}

// ── 10. 逆行通知ロジック ──────────────────────────────────────
function analyzeRetrogrades(natalChart, transitPlanets) {
  const results = [];

  transitPlanets.forEach(tp => {
    if (!tp.retrograde) return;

    const dictKey = `RETROGRADE_${tp.name.toUpperCase()}`;
    const retroDict = DICT[dictKey];
    if (!retroDict) return;

    // ネイタルチャートのどのハウスに逆行中の惑星がいるか
    let affectedHouse = null;
    if (natalChart.birthTimeKnown && natalChart.houseCusps) {
      affectedHouse = getHouseFromCusps(tp.lon, natalChart.houseCusps);
    }

    const houseInfo = affectedHouse ? DICT[`HOUSE_${affectedHouse}`] : null;
    const advice = affectedHouse ? retroDict.byHouse[affectedHouse] : retroDict.general;

    results.push({
      planet: tp.nameJa || tp.name,
      retrograde: true,
      affectedHouse,
      houseTheme: houseInfo?.theme || null,
      general: retroDict.general,
      advice,
      display: `【${tp.nameJa||tp.name}逆行】${houseInfo ? `あなたの${houseInfo.title}（${houseInfo.theme}）に影響：` : ""}${advice}`
    });
  });

  return results;
}

function getHouseFromCusps(lon, cusps) {
  const N = x => ((x%360)+360)%360;
  for (let i=0; i<12; i++) {
    const c1 = cusps[i];
    const c2 = cusps[(i+1)%12];
    const span = N(c2-c1);
    const dist = N(lon-c1);
    if (dist>=0 && dist<span) return i+1;
  }
  return 1;
}

// ========== MATH HELPERS ==========
const PI=Math.PI;
function r(d){return d*PI/180;}
function d(rd){return rd*180/PI;}
function N(x){return((x%360)+360)%360;}
function JD(dt){return dt.getTime()/86400000+2440587.5;}

// ========== SUN (Meeus Ch.25) ==========
function sunLon(T){
  const L0=N(280.46646+36000.76983*T+0.0003032*T*T);
  const M=r(N(357.52911+35999.05029*T-0.0001537*T*T));
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(M)+(0.019993-0.000101*T)*Math.sin(2*M)+0.000289*Math.sin(3*M);
  const sunTrue=L0+C;
  const omega=r(N(125.04-1934.136*T));
  return N(sunTrue-0.00569-0.00478*Math.sin(omega));
}

// ========== MOON (Meeus Ch.47) ==========
function moonLon(T){
  const Lp=N(218.3165+481267.8813*T-0.0013268*T*T+T*T*T/538841-T*T*T*T/65194000);
  const D=r(N(297.8502+445267.1115*T-0.0016300*T*T+T*T*T/545868-T*T*T*T/113065000));
  const M=r(N(357.5291+35999.0503*T-0.0001536*T*T+T*T*T/24490000));
  const Mp=r(N(134.9634+477198.8676*T+0.0089970*T*T+T*T*T/69699-T*T*T*T/14712000));
  const F=r(N(93.2721+483202.0175*T-0.0034029*T*T-T*T*T/3526000+T*T*T*T/863310000));
  const E=1-0.002516*T-0.0000074*T*T;
  const sigma=
    6.2888*Math.sin(Mp)
    +1.2740*Math.sin(2*D-Mp)
    +0.6583*E*Math.sin(2*D)
    +0.2136*Math.sin(2*Mp)
    -0.1851*E*Math.sin(M)
    -0.1143*Math.sin(2*F)
    +0.0588*Math.sin(2*D-2*Mp)
    +0.0572*E*Math.sin(2*D-M-Mp)
    +0.0533*Math.sin(2*D+Mp)
    +0.0458*E*Math.sin(2*D-M)
    +0.0409*Math.sin(Mp-F)
    -0.0347*E*Math.sin(M)
    +0.0304*E*Math.sin(2*D+M-Mp)
    +0.0154*Math.sin(2*Mp-2*F)
    +0.0130*Math.sin(4*D-Mp)
    -0.0122*Math.sin(2*D-Mp-2*F)
    +0.0117*E*Math.sin(4*D-2*Mp)
    -0.0111*Math.sin(2*D-2*Mp)
    +0.0108*E*Math.sin(M+2*Mp-2*D)
    -0.0107*Math.sin(2*D-M-2*F)
    +0.0101*E*Math.sin(2*D+M);
  return N(Lp+sigma);
}

// ========== PLANETS (Meeus Table 31.a, proper helio→geo) ==========
function kepE(M,e){let E=M;for(let i=0;i<20;i++){const dE=(M-(E-e*Math.sin(E)))/(1-e*Math.cos(E));E+=dE;if(Math.abs(dE)<1e-12)break;}return E;}

function helio(a,e,i_,Om,w,L0,n,T){
  const L=r(N(L0+n*T));
  const omegaBar=r(N(Om+w));
  const M=N(d(L)-N(d(omegaBar)));
  const Mrad=r(M);
  const E=kepE(Mrad,e);
  const nu=2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));
  const rv=a*(1-e*Math.cos(E));
  const Omr=r(N(Om)),wr=r(N(w)),ir=r(i_);
  const cosOm=Math.cos(Omr),sinOm=Math.sin(Omr),cosw=Math.cos(wr),sinw=Math.sin(wr),cosI=Math.cos(ir),cosnu=Math.cos(nu),sinnu=Math.sin(nu);
  const x=rv*(cosOm*(cosw*cosnu-sinw*sinnu)-sinOm*(sinw*cosnu+cosw*sinnu)*cosI);
  const y=rv*(sinOm*(cosw*cosnu-sinw*sinnu)+cosOm*(sinw*cosnu+cosw*sinnu)*cosI);
  const z=rv*(sinw*cosnu+cosw*sinnu)*Math.sin(ir);
  return{x,y,z};
}

// Earth barycenter (Meeus)
function earthHelio(T){
  return helio(1.000001018,0.01670083,0,0,102.93005,100.46457,36000.76983,T);
}

function geo(a,e,i_,Om,obar,L0,n,T){
  // obar = longitude of perihelion (= Om + w in Meeus notation)
  // w = argument of perihelion = obar - Om
  const w = N(obar - Om);
  const p=helio(a,e,i_,Om,w,L0,n,T);
  const e2=earthHelio(T);
  const dx=p.x-e2.x,dy=p.y-e2.y;
  return N(d(Math.atan2(dy,dx)));
}

// Planetary elements (J2000.0, Meeus Appendix II Table 31.a)
// Args: a, e, i, Om (ascending node), obar (longitude of perihelion), L0 (mean lon), n (mean motion/century)
function Mercury(T){return geo(0.38709927,0.20563593,7.00497902,48.33076593,77.45779628,252.25032350,149472.67411175,T);}
function Venus(T){return geo(0.72333566,0.00677672,3.39467605,76.67984255,131.60246718,181.97909950,58517.81538729,T);}
function Mars(T){
  // Base heliocentric then geocentric
  let lon=geo(1.52366231,0.09341233,1.84969142,49.71320984,336.04084002,355.43327460,19140.30268499,T);
  // Add major perturbations from Jupiter (Meeus Ch.32)
  const Mj=r(N(20.9+3034.906*T)); // Jupiter mean anomaly approx
  const Mm=r(N(19.387+19140.302*T)); // Mars mean anomaly
  lon=N(lon-0.01*(4.8*Math.sin(2*Mm-Mj)-4.2*Math.sin(Mm+Mj)));
  return lon;
}
function Jupiter(T){return geo(5.20288700,0.04838624,1.30439695,100.47390909,14.72847983,34.39644051,3034.74612775,T);}
function Saturn(T){return geo(9.53667594,0.05386179,2.48599187,113.66242448,92.59887831,49.95424423,1222.49514316,T);}
function Uranus(T){return geo(19.18916464,0.04725744,0.77263783,74.01692503,170.95427630,313.23810451,428.48202785,T);}
function Neptune(T){return geo(30.06992276,0.00859048,1.77004347,131.78422574,44.96476227,-55.12002969,218.45945325,T);}
function Pluto(T){return N(238.958+144.96*T+3.86*Math.sin(r(N(238.96+144.96*T)))-5.1*Math.sin(r(N(148.09+109.38*T))));}

function isRetro(fn,J){if(!fn)return false;const T1=(J-0.5-2451545)/36525,T2=(J+0.5-2451545)/36525;let dv=fn(T2)-fn(T1);if(dv>180)dv-=360;if(dv<-180)dv+=360;return dv<0;}

// ========== ASC / MC / HOUSES ==========
function gst(J){const T=(J-2451545)/36525;return N(280.46061837+360.98564736629*(J-2451545)+0.000387933*T*T);}
function calcAsc(lst,lat,eps){
  // Meeus Ch.14: tan(ASC) = -cos(RAMC) / (sin(RAMC)*cos(eps) + tan(lat)*sin(eps))
  // atan2 gives DSC; add 180° to get ASC
  const L=r(lst),latR=r(lat),epsR=r(eps);
  const asc=d(Math.atan2(-Math.cos(L),Math.sin(L)*Math.cos(epsR)+Math.tan(latR)*Math.sin(epsR)));
  return N(asc+180);
}
function calcMC(lst,eps){
  const L=r(lst),epsR=r(eps);
  let mc=d(Math.atan2(Math.sin(L),Math.cos(L)*Math.cos(epsR)));
  return N(mc);
}
function eps(T){return 23.4392911-0.013004167*T-0.000000164*T*T+0.000000504*T*T*T;}

// Placidus house cusps (equal-division approximation per quadrant)
function placidus(asc,mc,lat,eps_val){
  // The 4 angular cusps
  const ic=N(mc+180), dsc=N(asc+180);
  const cusps=new Array(12);
  cusps[0]=asc; cusps[3]=ic; cusps[6]=dsc; cusps[9]=mc;

  // H1→H4 (ASC to IC, zodiac direction = increasing longitude)
  const h1h4=N(ic-asc);
  cusps[1]=N(asc+h1h4/3);
  cusps[2]=N(asc+h1h4*2/3);

  // H4→H7 (IC to DSC)
  const h4h7=N(dsc-ic);
  cusps[4]=N(ic+h4h7/3);
  cusps[5]=N(ic+h4h7*2/3);

  // H7→H10 (DSC to MC)
  const h7h10=N(mc-dsc);
  cusps[7]=N(dsc+h7h10/3);
  cusps[8]=N(dsc+h7h10*2/3);

  // H10→H1 (MC to ASC)
  const h10h1=N(asc-mc);
  cusps[10]=N(mc+h10h1/3);
  cusps[11]=N(mc+h10h1*2/3);

  return cusps;
}

function getHouse(lon,cusps){
  for(let i=0;i<12;i++){
    const c1=cusps[i],c2=cusps[(i+1)%12];
    const span=N(c2-c1);
    const dist=N(lon-c1);
    if(dist>=0&&dist<span)return i+1;
  }
  return 1;
}

function calcAspects(planets){
  const list=[];
  for(let i=0;i<planets.length;i++)for(let j=i+1;j<planets.length;j++){
    let diff=Math.abs(planets[i].lon-planets[j].lon);
    if(diff>180)diff=360-diff;
    for(const a of ASPD){const orb=Math.abs(diff-a.angle);if(orb<=a.orb)list.push({p1:planets[i],p2:planets[j],asp:a,orb:orb.toFixed(1)});}
  }
  return list.sort((a,b)=>parseFloat(a.orb)-parseFloat(b.orb)).slice(0,16);
}

function calcChart(dateStr,timeStr,lat,lng,btk,tzOffset){
  // Convert local birth time to UTC using explicit timezone offset
  // e.g. JST 16:10 with tzOffset=9 → UTC 07:10
  let dt;
  if(btk){
    const [y,mo,d]=dateStr.split('-').map(Number);
    const [h,mn]=(timeStr||'12:00').split(':').map(Number);
    // tzOffset in hours (e.g. 9 for JST)
    const utcH=h-tzOffset, utcMn=mn-(tzOffset%1)*60;
    dt=new Date(Date.UTC(y,mo-1,d,utcH,utcMn,0));
  } else {
    const [y,mo,d]=dateStr.split('-').map(Number);
    dt=new Date(Date.UTC(y,mo-1,d,3,0,0)); // noon JST ≈ 03:00 UTC
  }
  const J=JD(dt),T=(J-2451545)/36525;
  const planets=PL.map(p=>{
    const lon=p.fn(T),sIdx=Math.floor(lon/30),deg=lon%30;
    const retro=isRetro(p.fn,J);
    return{...p,lon,sIdx,deg,sign:SG[sIdx],retrograde:retro};
  });
  let asc=null,mc=null,cusps=null;
  if(btk){
    const epsVal=eps(T);
    const lng_local=lng; // East positive
    // Local Sidereal Time
    const gstDeg=gst(J);
    const lst=N(gstDeg+lng_local);
    const ascLon=calcAsc(lst,lat,epsVal);
    const mcLon=calcMC(lst,epsVal);
    asc={lon:ascLon,sIdx:Math.floor(ascLon/30),deg:ascLon%30,sign:SG[Math.floor(ascLon/30)]};
    mc={lon:mcLon,sIdx:Math.floor(mcLon/30),deg:mcLon%30,sign:SG[Math.floor(mcLon/30)]};
    cusps=placidus(ascLon,mcLon,lat,epsVal);
    planets.forEach(p=>p.house=getHouse(p.lon,cusps));
  }
  return{planets,asc,mc,cusps,aspects:calcAspects(planets),T,J,btk};
}

// ========== DRAW CHART ==========
function drawChart(chart){
  const cv=document.getElementById('nc'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  const Ro=W/2-4,Rso=Ro-16,Rsi=Ro-40,Rhi=Ro-54,Rasp=Ro-90,Rplt=Ro-72;

  // 背景（クリーム白）
  ctx.beginPath();ctx.arc(cx,cy,Ro,0,2*PI);
  ctx.fillStyle='#faf6ec';ctx.fill();
  ctx.strokeStyle='#b08040';ctx.lineWidth=2;ctx.stroke();

  // ASC基準の変換
  // ASCが左(9時=π)、MCが上(12時=-π/2)、反時計回り
  const aL=chart.asc?chart.asc.lon:0;
  function toA(lon){return r(N(-(lon-aL)+180));}

  // 度数目盛り
  for(let deg=0;deg<360;deg++){
    const a=toA(deg),maj=deg%10===0,mid=deg%5===0,len=maj?6:mid?3.5:2;
    ctx.beginPath();ctx.moveTo(cx+(Ro-2)*Math.cos(a),cy+(Ro-2)*Math.sin(a));
    ctx.lineTo(cx+(Ro-2-len)*Math.cos(a),cy+(Ro-2-len)*Math.sin(a));
    ctx.strokeStyle=maj?'#906030':'#c8a060';ctx.lineWidth=maj?0.7:0.3;ctx.stroke();
  }

  // サインリング
  ctx.beginPath();ctx.arc(cx,cy,Rso,0,2*PI);ctx.strokeStyle='#b08040';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,Rsi,0,2*PI);ctx.strokeStyle='#b08040';ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<12;i++){
    const a1=toA(i*30),a2=toA((i+1)*30),s=SG[i];
    ctx.beginPath();ctx.arc(cx,cy,Rso,a1,a2,true);ctx.arc(cx,cy,Rsi,a2,a1);ctx.closePath();
    ctx.fillStyle=ELB[s.el];ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+Rsi*Math.cos(a1),cy+Rsi*Math.sin(a1));ctx.lineTo(cx+Rso*Math.cos(a1),cy+Rso*Math.sin(a1));
    ctx.strokeStyle='#b08040';ctx.lineWidth=0.7;ctx.stroke();
    const mA=toA(i*30+15),sR=(Rsi+Rso)/2;
    ctx.font='bold 12px serif';ctx.fillStyle=ELC[s.el];ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s.sym,cx+sR*Math.cos(mA),cy+sR*Math.sin(mA));
  }

  // ハウスリング
  ctx.beginPath();ctx.arc(cx,cy,Rhi,0,2*PI);ctx.strokeStyle='#c8a060';ctx.lineWidth=0.5;ctx.stroke();

  // ハウスライン
  const cps=chart.cusps||(chart.asc?Array.from({length:12},(_,i)=>N(aL+i*30)):Array.from({length:12},(_,i)=>i*30));
  cps.forEach((lon,i)=>{
    const a=toA(lon),ang=[0,3,6,9].includes(i);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Rhi*Math.cos(a),cy+Rhi*Math.sin(a));
    ctx.strokeStyle=ang?'#705010':'#c8a060';ctx.lineWidth=ang?1.1:0.4;ctx.setLineDash(ang?[]:[2,3]);ctx.stroke();ctx.setLineDash([]);
    if(ang){ctx.beginPath();ctx.moveTo(cx+Rhi*Math.cos(a),cy+Rhi*Math.sin(a));ctx.lineTo(cx+Rsi*Math.cos(a),cy+Rsi*Math.sin(a));ctx.strokeStyle='#705010';ctx.lineWidth=1;ctx.stroke();}
    // ハウス番号
    const next=cps[(i+1)%12];const span=N(next-lon);
    const midA=toA(lon+span/2);
    ctx.font='bold 8px serif';ctx.fillStyle='#705020';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(i+1,cx+(Rasp*0.5)*Math.cos(midA),cy+(Rasp*0.5)*Math.sin(midA));
    // カスプ度数
    const cR=Rhi+5,sIdx2=Math.floor(lon/30),deg2=(lon%30).toFixed(0);
    ctx.font='5.5px monospace';ctx.fillStyle='#907040';ctx.fillText(deg2+'°',cx+cR*Math.cos(a),cy+cR*Math.sin(a));
  });

  // ASC/DSC/MC/IC ラベル
  if(chart.asc){
    [{lon:chart.asc.lon,lbl:'ASC',c:'#6a0000'},{lon:N(chart.asc.lon+180),lbl:'DSC',c:'#6a0000'},
     {lon:chart.mc.lon,lbl:'MC',c:'#00006a'},{lon:N(chart.mc.lon+180),lbl:'IC',c:'#00006a'}].forEach(({lon,lbl,c})=>{
      const a=toA(lon);ctx.font='bold 7px sans-serif';ctx.fillStyle=c;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(lbl,cx+(Ro+2)*Math.cos(a),cy+(Ro+2)*Math.sin(a));
    });
  }

  // アスペクト線
  const AC={conj:'rgba(50,50,180,.65)',trine:'rgba(0,130,170,.7)',sext:'rgba(0,130,170,.45)',square:'rgba(170,20,20,.65)',opp:'rgba(170,20,20,.45)'};
  const AD={conj:[],trine:[],sext:[4,3],square:[],opp:[5,3]};
  chart.aspects.slice(0,14).forEach(asp=>{
    const a1=toA(asp.p1.lon),a2=toA(asp.p2.lon);
    ctx.beginPath();ctx.moveTo(cx+Rasp*Math.cos(a1),cy+Rasp*Math.sin(a1));ctx.lineTo(cx+Rasp*Math.cos(a2),cy+Rasp*Math.sin(a2));
    ctx.strokeStyle=AC[asp.asp.type]||'rgba(80,80,180,.4)';ctx.lineWidth=0.85;ctx.setLineDash(AD[asp.asp.type]||[]);ctx.stroke();ctx.setLineDash([]);
  });
  ctx.beginPath();ctx.arc(cx,cy,Rasp,0,2*PI);ctx.strokeStyle='#d4b060';ctx.lineWidth=0.4;ctx.stroke();

  // 天体（重なり補正）
  const placed=[];
  chart.planets.forEach(p=>{
    let rv=Rplt;const a=toA(p.lon);
    for(const q of placed){let da=Math.abs(p.lon-q)%360;if(da>180)da=360-da;if(da<7){rv-=14;break;}}
    placed.push(p.lon);
    const x=cx+rv*Math.cos(a),y=cy+rv*Math.sin(a);
    ctx.beginPath();ctx.arc(x,y,8.5,0,2*PI);ctx.fillStyle='rgba(250,246,236,.92)';ctx.fill();ctx.strokeStyle=p.color;ctx.lineWidth=0.8;ctx.stroke();
    ctx.font='bold 12px serif';ctx.fillStyle=p.color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.sym,x,y);
    const lr=rv+16;ctx.font='5.5px monospace';ctx.fillStyle='#806040';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.deg.toFixed(0)+'°',cx+lr*Math.cos(a),cy+lr*Math.sin(a));
    if(p.retrograde){ctx.font='6px serif';ctx.fillStyle='#901050';ctx.fillText('℞',x+9,y-8);}
  });
  ctx.beginPath();ctx.arc(cx,cy,2.5,0,2*PI);ctx.fillStyle='#a08040';ctx.fill();
}

// ========== RENDER ==========
function renderPL(chart){
  document.getElementById('pl').innerHTML=chart.planets.map(p=>
    '<div class="pr"><span class="ps" style="color:'+p.color+'">'+p.sym+'</span><span class="pn">'+PJ[p.name]+'</span><span class="pg">'+p.sign.name+'</span><span class="pd">'+p.deg.toFixed(1)+'°</span>'+(p.retrograde?'<span class="prt">℞</span>':'')+(chart.cusps&&p.house?'<span class="ph">'+p.house+'H</span>':'')+'</div>'
  ).join('');
}
function renderAS(chart){
  const tc={conj:'aconj',trine:'atrin',sext:'asext',square:'asq',opp:'aopp'};
  document.getElementById('ag').innerHTML=chart.aspects.map(a=>'<div class="ac2"><span class="at '+tc[a.asp.type]+'">'+a.asp.sym+'</span><span class="ab">'+PJ[a.p1.name]+'×'+PJ[a.p2.name]+'</span><span class="ao">'+a.orb+'°</span></div>').join('');
}

// ========== AI READING ==========
function makeSummary(chart,city){
  const g=n=>chart.planets.find(p=>p.name===n);
  const sun=g('Sun'),moon=g('Moon'),merc=g('Mercury'),ven=g('Venus'),
        mars=g('Mars'),jup=g('Jupiter'),sat=g('Saturn'),ura=g('Uranus'),nep=g('Neptune'),plu=g('Pluto');
  const h=p=>(chart.btk&&p.house)?p.house+'H':'';
  const rv=p=>p.retrograde?'℞':'';
  const fmt=p=>{
    const sn=typeof p.sign==='object'?p.sign.name:(p.signJa||p.sign||'');
    return sn+' '+p.deg.toFixed(1)+'°'+(h(p)?' '+h(p):'')+rv(p);
  };
  // アスペクト詳細：サイン・ハウス付き
  const aspDetail=chart.aspects.slice(0,12).map(a=>{
    const h1=h(a.p1),h2=h(a.p2);
    return PJ[a.p1.name]+'('+a.p1.sign.name+(h1?' '+h1:'')+') '+a.asp.name+' '+PJ[a.p2.name]+'('+a.p2.sign.name+(h2?' '+h2:'')+') orb'+a.orb+'°';
  }).join('\n');
  return '出生地:'+city+'\n\n'
    +'■天体配置（サイン 度数 ハウス）\n'
    +'太陽:'+fmt(sun)+'\n月:'+fmt(moon)+'\n水星:'+fmt(merc)+'\n金星:'+fmt(ven)+'\n火星:'+fmt(mars)+'\n'
    +'木星:'+fmt(jup)+'\n土星:'+fmt(sat)+'\n天王星:'+fmt(ura)+'\n海王星:'+fmt(nep)+'\n冥王星:'+fmt(plu)+'\n'
    +(chart.asc?'ASC:'+chart.asc.sign.name+' '+chart.asc.deg.toFixed(1)+'°\nMC:'+chart.mc.sign.name+' '+chart.mc.deg.toFixed(1)+'°\n':'')
    +'\n■アスペクト一覧（サイン・ハウス付き）\n'+aspDetail;
}


function generateReadings(chart,city){
  // planetsのsignを正規化（オブジェクト→文字列）＋element/qualityを付与
  const jaToEn={'牡羊座':'Aries','牡牛座':'Taurus','双子座':'Gemini','蟹座':'Cancer',
    '獅子座':'Leo','乙女座':'Virgo','天秤座':'Libra','蠍座':'Scorpio',
    '射手座':'Sagittarius','山羊座':'Capricorn','水瓶座':'Aquarius','魚座':'Pisces'};
  const signEl={'Aries':'fire','Taurus':'earth','Gemini':'air','Cancer':'water',
    'Leo':'fire','Virgo':'earth','Libra':'air','Scorpio':'water',
    'Sagittarius':'fire','Capricorn':'earth','Aquarius':'air','Pisces':'water'};
  const signQu={'Aries':'cardinal','Taurus':'fixed','Gemini':'mutable','Cancer':'cardinal',
    'Leo':'fixed','Virgo':'mutable','Libra':'cardinal','Scorpio':'fixed',
    'Sagittarius':'mutable','Capricorn':'cardinal','Aquarius':'fixed','Pisces':'mutable'};
  chart.planets.forEach(p=>{
    if(typeof p.sign==='object'&&p.sign.name){
      p.signJa=p.sign.name;
      p.element=p.sign.el||signEl[jaToEn[p.sign.name]]||'fire';
      p.quality=signQu[jaToEn[p.sign.name]]||'cardinal';
      p.sign=jaToEn[p.sign.name]||p.sign.name;
    } else {
      if(!p.element)p.element=signEl[p.sign]||'fire';
      if(!p.quality)p.quality=signQu[p.sign]||'cardinal';
    }
    if(!p.signJa)p.signJa=p.sign;
  });
  if(chart.asc&&typeof chart.asc.sign==='object'){
    chart.asc.signJa=chart.asc.sign.name;chart.asc.sign=chart.asc.sign.name;
  }
  if(chart.mc&&typeof chart.mc.sign==='object'){
    chart.mc.signJa=chart.mc.sign.name;chart.mc.sign=chart.mc.sign.name;
  }
  // BTKフラグをchartに明示的にセット
  chart.birthTimeKnown=chart.btk;
  // エンジン呼び出し
  const result = generateReading(chart);

  function set(id,text){
    document.getElementById(id).innerHTML = text
      ? '<p>'+text.replace(/\n/g,'<br>')+'</p>'
      : '<p style="color:#c86888;font-size:11px">データなし</p>';
  }

  set('rcp', result.personality);
  set('rcd', result.destiny);
  set('rcm', result.mission);

  // 現在の運勢（逆行情報）
  const today = new Date().toLocaleDateString('ja-JP');
  const retroPlanets = chart.planets.filter(p=>p.retrograde);
  let transitText = '今（'+today+'）の星の流れ：';
  if(retroPlanets.length){
    const retroResults = analyzeRetrogrades(chart, retroPlanets);
    if(retroResults.length){
      transitText += '\n' + retroResults.map(r=>r.display).join('\n');
    } else {
      transitText += '現在、あなたのチャートに直接影響する逆行はありません。じっくり自分のペースで進める時期です。';
    }
  } else {
    transitText += '現在、逆行中の天体はあなたのチャートに大きな影響を与えていません。星の流れに乗って、自分のペースで前進できる時期です。';
  }
  set('tr', transitText);

  // 月サイン警告
  if(result.moonWarning){
    const ub = document.getElementById('ub');
    if(ub){
      ub.querySelector('.ubt').textContent = result.moonWarning.message;
      ub.classList.add('show');
    }
  }

  // エレメント分布（レーダーチャート）
  renderDistribution(result.distribution);
}

function drawRadar(cvId,labels,vals,colors,max){
  const cv=document.getElementById(cvId);
  if(!cv)return;
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  const R=Math.min(cx,cy)-26;
  const N=labels.length;
  ctx.clearRect(0,0,W,H);
  for(let ring=1;ring<=max;ring++){
    ctx.beginPath();
    for(let i=0;i<N;i++){
      const a=i*2*Math.PI/N-Math.PI/2;
      const r=R*ring/max;
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    }
    ctx.closePath();ctx.strokeStyle='rgba(200,160,80,0.45)';ctx.lineWidth=1;ctx.stroke();
  }
  for(let i=0;i<N;i++){
    const a=i*2*Math.PI/N-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
    ctx.strokeStyle='rgba(200,160,80,0.6)';ctx.lineWidth=1.2;ctx.stroke();
    const lr=R+14;
    ctx.font='bold 10px serif';ctx.fillStyle=colors[i%colors.length];ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(labels[i],cx+lr*Math.cos(a),cy+lr*Math.sin(a));
    if(vals[i]>0){
      const vr=R*vals[i]/max;
      ctx.font='9px monospace';ctx.fillStyle='rgba(255,220,120,0.9)';
      ctx.fillText(vals[i],cx+(vr+10)*Math.cos(a),cy+(vr+10)*Math.sin(a));
    }
  }
  ctx.beginPath();
  for(let i=0;i<N;i++){
    const a=i*2*Math.PI/N-Math.PI/2,r=R*vals[i]/max;
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath();ctx.fillStyle='rgba(200,120,80,0.22)';ctx.fill();
  ctx.strokeStyle='rgba(200,120,80,1)';ctx.lineWidth=2.5;ctx.stroke();
  for(let i=0;i<N;i++){
    const a=i*2*Math.PI/N-Math.PI/2,r=R*vals[i]/max;
    ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),3.5,0,2*Math.PI);
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
  }
}

  ];
  const el=document.getElementById('dist-comment');
  if(el)el.innerHTML=lines.filter(Boolean).join('<br>');
}

// ========== MAIN ==========
let CChart=null;
function startReading(){
  const dateVal=document.getElementById('idate').value;
  const timeVal=document.getElementById('itime').value||'12:00';
  const lat=parseFloat(document.getElementById('ilat').value);
  const lng=parseFloat(document.getElementById('ilng').value);
  const city=document.getElementById('icity').value||'出生地';
  if(!dateVal){alert('生年月日を入力してください');return;}
  if(isNaN(lat)||isNaN(lng)){alert('出生地を選択してください（都市名を入力してリストから選んでください）');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='⏳ 計算中…';
  try{
    const tzOff=parseFloat(document.getElementById('itz').value)||9;
    CChart=calcChart(dateVal,timeVal,lat,lng,BTK,tzOff);
    // planets に nameJa を付与
    CChart.planets.forEach(p=>{p.nameJa=PJ[p.name];});
    // angles に signJa を付与
    if(CChart.asc){CChart.asc.signJa=CChart.asc.sign.name||SG[CChart.asc.sIdx]?.name;}
    if(CChart.mc){CChart.mc.signJa=CChart.mc.sign.name||SG[CChart.mc.sIdx]?.name;}
    document.getElementById('HP').style.display='none';
    document.getElementById('rp').classList.add('show');
    window.scrollTo(0,0);
    const dO=new Date(dateVal);
    document.getElementById('rt').textContent=city+' — '+dO.getFullYear()+'年'+(dO.getMonth()+1)+'月'+dO.getDate()+'日';
    document.getElementById('rs').textContent='太陽 '+CChart.planets[0].sign.name+' · 月 '+CChart.planets[1].sign.name+(CChart.asc?' · ASC '+CChart.asc.sign.name:'');
    if(!BTK)document.getElementById('ub').classList.add('show');
    drawChart(CChart);renderPL(CChart);renderAS(CChart);
    generateReadings(CChart,city);
  }catch(e){alert('計算エラー: '+e.message);console.error(e);}
  btn.disabled=false;btn.textContent='✦ 星を読む ✦';
}

function goBack(){document.getElementById('HP').style.display='flex';document.getElementById('rp').classList.remove('show');document.getElementById('ub').classList.remove('show');window.scrollTo(0,0);}
